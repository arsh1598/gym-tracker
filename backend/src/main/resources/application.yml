spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/gym_tracker}
    username: ${DATABASE_USERNAME:gymuser}
    password: ${DATABASE_PASSWORD:gympassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:8080}

logging:
  level:
    com.gymtracker: INFO
    org.hibernate.SQL: WARN
