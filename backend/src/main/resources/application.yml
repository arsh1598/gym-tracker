spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gym_tracker
    username: gymuser
    password: gympassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: always

server:
  port: 8080

logging:
  level:
    com.gymtracker: DEBUG
    org.hibernate.SQL: DEBUG
