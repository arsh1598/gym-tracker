version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gym_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gym_tracker
      POSTGRES_USER: gymuser
      POSTGRES_PASSWORD: gympassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymuser -d gym_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Optional: pgAdmin for DB management at http://localhost:5050
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gym_tracker_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gymtracker.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
